name: Fetch FieldDefinition (CSV)

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 1'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch FieldDefinitions (CSV)
        uses: kotaoue/salesforce-field-inspector@main
        with:
          format: csv
          output_dir: docs
          sfdx_auth_url: ${{ secrets.SFDX_AUTH_URL }}
          sf_username: ${{ secrets.SF_USERNAME }}

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/field-definitions.csv
          git diff --cached --quiet || git commit -m "chore: update field-definitions.csv [skip ci]"
          git push
