name: Fetch FieldDefinition (JSON per object)

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 2'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch FieldDefinitions (JSON per object)
        uses: kotaoue/salesforce-field-inspector@main
        with:
          format: json-per-object
          output_dir: docs/objects
          sfdx_auth_url: ${{ secrets.SFDX_AUTH_URL }}
          sf_username: ${{ secrets.SF_USERNAME }}

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/objects/
          git diff --cached --quiet || git commit -m "chore: update field definitions JSON per object [skip ci]"
          git push
