name: "Fetch Salesforce Field Definitions"
description: "Fetch FieldDefinition records from Salesforce Tooling API and save them to a file or directory."

inputs:
  format:
    description: "Output format. One of: json, csv, json-per-object, csv-per-object, package-xml (for field definitions), entity-json, entity-csv (for entity definitions)."
    required: true
    default: "json"
  output_dir:
    description: "Directory to write output files into. Defaults to docs/ relative to the caller workspace."
    required: false
    default: "docs"
  object_scope:
    description: "Object scope filter. One of: all, system, custom."
    required: false
    default: "all"
  field_definition_fields:
    description: "Comma-separated FieldDefinition fields to select. Defaults to all supported fields."
    required: false
    default: ""
  entity_definition_fields:
    description: "Comma-separated EntityDefinition fields to select. Defaults to all supported fields. Only used when format is entity-json or entity-csv."
    required: false
    default: ""
  updated_within:
    description: "Only fetch objects modified within this duration (e.g. '2days', '12hours', '30min', '1week'). Leave empty to fetch all objects."
    required: false
    default: ""
  metadata_api_version:
    description: "Salesforce Metadata API version to declare in the generated package.xml (e.g. '62.0'). Only used when format is package-xml."
    required: false
    default: ""
  sfdx_auth_url:
    description: "SFDX Auth URL used to authenticate to Salesforce (e.g. from secrets.SFDX_AUTH_URL)."
    required: true
  sf_username:
    description: "Salesforce username to run queries as (e.g. from secrets.SF_USERNAME)."
    required: true

branding:
  icon: "search"
  color: "blue"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install dependencies
      shell: bash
      run: npm ci
      working-directory: ${{ github.action_path }}

    - name: Authenticate to Salesforce
      shell: bash
      env:
        SFDX_AUTH_URL: ${{ inputs.sfdx_auth_url }}
      run: echo "$SFDX_AUTH_URL" | npx sf org login sfdx-url --sfdx-url-file /dev/stdin --set-default
      working-directory: ${{ github.action_path }}

    - name: Fetch FieldDefinitions or EntityDefinitions
      shell: bash
      env:
        SF_USERNAME: ${{ inputs.sf_username }}
        OUTPUT_DIR: ${{ github.workspace }}/${{ inputs.output_dir }}
        FIELD_DEFINITION_FIELDS: ${{ inputs.field_definition_fields }}
        ENTITY_DEFINITION_FIELDS: ${{ inputs.entity_definition_fields }}
        UPDATED_WITHIN: ${{ inputs.updated_within }}
        METADATA_API_VERSION: ${{ inputs.metadata_api_version }}
      run: |
        FORMAT="${{ inputs.format }}"
        SCOPE="${{ inputs.object_scope }}"
        if [[ "$FORMAT" == entity-* ]]; then
          ENTITY_FORMAT="${FORMAT#entity-}"
          node ${{ github.action_path }}/scripts/fetch-entity-definitions.js "$ENTITY_FORMAT" "$SCOPE"
        else
          node ${{ github.action_path }}/scripts/fetch-field-definitions.js "$FORMAT" "$SCOPE"
        fi
